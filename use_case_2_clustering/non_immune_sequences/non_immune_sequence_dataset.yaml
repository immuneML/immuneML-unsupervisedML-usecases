definitions:
    datasets:
        my_random_dataset:
            format: RandomSequenceDataset
            params:
                sequence_count: 20000 # number of random sequences to generate
                length_probabilities:
                    14: 0.8 # 80% of all generated sequences for all sequences will have length 14
                    15: 0.2 # 20% of all generated sequences across all sequences will have length 15
                labels:
                    epitope1: # label name
                        label1: 0.05
                        label2: 0.05
                        label3: 0.05
                        label4: 0.05
                        label5: 0.05
                        label6: 0.05
                        label7: 0.05
                        label8: 0.05
                        label9: 0.05
                        label10: 0.05
                        label11: 0.05
                        label12: 0.05
                        label13: 0.05
                        label14: 0.05
                        label15: 0.05
                        label16: 0.05
                        label17: 0.05
                        label18: 0.05
                        label19: 0.05
                        label20: 0.05
instructions:
    my_dataset_export_instruction: # user-defined instruction name
        type: DatasetExport # which instruction to execute
        datasets:
            - my_random_dataset